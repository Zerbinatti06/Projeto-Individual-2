<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/icon/favicon.svg" type="image/x-icon">
    <link rel="stylesheet" href="./styles/colors.css">
    <link rel="stylesheet" href="./styles/index.css">
    <link rel="stylesheet" href="./styles/login.css">
    <title>CADASTRO</title>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <h1 class="title">CADASTRO</h1>
            <div class="inputs">
                <div class="input">
                    <input type="text" placeholder="Apelido" id="inUsername">
                </div>
                <div class="input">
                    <input type="text" placeholder="Email" id="inEmail">
                </div>
                <div class="input">
                    <input type="text" placeholder="Senha" id="inPass">
                </div>
            </div>
            <span id="msg"></span>
            <div class="btn"><button onclick="init(inUsername.value, inEmail.value, inPass.value)">Registrar-se</button></div>
            <p>Já tem uma conta? <span><a href="./login.html" style="color: var(--accent);">Logar-se</a></span></p>
        </div>
    </div>
</body>
<script>
        function verifyEmailInputs(email){
        if (!email) return false;

        if (!email.includes("@")) return false;

        const partes = email.split("@");

        // Deve haver exatamente um @
        if (partes.length !== 2) return false;

        const usuario = partes[0];
        const dominio = partes[1];

        // Não pode estar vazio antes ou depois do @
        if (usuario.length === 0 || dominio.length === 0) return false;

        // O domínio precisa ter pelo menos um ponto
        if (!dominio.includes(".")) return false;

        const dominioPartes = dominio.split(".");

        // Nenhuma parte do domínio pode estar vazia
        for (let i = 0; i < dominioPartes.length; i++) {
            if (dominioPartes[i].length === 0) return false;
        }

        return true;
    }

    function verifyPasswordInputs(password){
        let hasLetter = false;
        let hasNumber = false;

        if(!password) return false;

        if(password.length < 8 || password.length > 16) return false;

        for(let i = 0; i < password.length; i++){
            let char = password[i];

            if((char >= "a" && char <= "z") || (char >= "A" && char <= "Z")) hasLetter = true;
            if(char >= "0" && char <= "9") hasNumber = true;

            if(hasLetter && hasNumber) break;
        }

        return hasLetter && hasNumber
    }

    function verifyUsernameInputs(username){
        if(!username) return false;

        if(username.length < 3) return false;

        return true;
    }

    function register(username, email, password){
        fetch('/user/register', {
            method:"POST",
            headers:{
                "Content-type":"application/json"
            },
            body:JSON.stringify({
                username:username,
                email:email,
                pass:password
            })
        })
        .then(response => {
            response.json()
            .then(response => {
                window.location = 'login.html'
            })
        })
        .catch(err => {
            console.log(err);
        })
    }

    function msgError(){
        msg.innerText = "Credenciais incorretas, tente novamente!"
    }

    function init(username, email, pass){
        if(verifyEmailInputs(email) && verifyPasswordInputs(pass) && verifyUsernameInputs(username)){
            register(username, email, pass)

            return;
        }

        msgError()
    }
</script>
</html>
